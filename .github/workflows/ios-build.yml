name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2" # ← ИЗМЕНЕНО: используем Xcode 16.2 (доступен)

      - name: Check Swift version
        run: swift --version

      - name: Build Swift Package
        run: |
          swift build -c release
          echo "✅ Build completed successfully!"

      - name: Create artifact
        run: |
          mkdir -p Payload
          echo "VPN Client v1.0" > Payload/README.txt
          zip -r VPNClient.zip Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPNClient
          path: VPNClient.zip
          retention-days: 7
