name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.2.app
          xcodebuild -version
          swift --version

      - name: Build iOS app
        run: |
          # Собираем для iOS
          swift build -c release --triple arm64-apple-ios

          # Находим собранный файл
          echo "Looking for built binary..."
          find .build -name "VPNClient" -type f 2>/dev/null || true

          # Создаем структуру приложения
          mkdir -p Payload/VPNClient.app

          # Копируем исполняемый файл (пробуем разные пути)
          if [ -f ".build/arm64-apple-ios/release/VPNClient" ]; then
            cp .build/arm64-apple-ios/release/VPNClient Payload/VPNClient.app/
          elif [ -f ".build/release/VPNClient" ]; then
            cp .build/release/VPNClient Payload/VPNClient.app/
          elif [ -f ".build/arm64-apple-ios/debug/VPNClient" ]; then
            cp .build/arm64-apple-ios/debug/VPNClient Payload/VPNClient.app/
          else
            echo "ERROR: Cannot find built binary!"
            ls -la .build/
            ls -la .build/arm64-apple-ios/ 2>/dev/null || true
            ls -la .build/release/ 2>/dev/null || true
            exit 1
          fi

          # Создаем Info.plist
          cat > Payload/VPNClient.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.yowaimo.vpnclient</string>
              <key>CFBundleName</key>
              <string>VPNClient</string>
              <key>CFBundleDisplayName</key>
              <string>VPN Client</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleExecutable</key>
              <string>VPNClient</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>iPhoneOS</string>
              </array>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
          </dict>
          </plist>
          EOF

          # Делаем исполняемый файл... исполняемым
          chmod +x Payload/VPNClient.app/VPNClient

          # Создаем IPA
          zip -r VPNClient.ipa Payload/

          echo "✅ IPA created successfully!"
          ls -la VPNClient.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VPNClient
          path: VPNClient.ipa
