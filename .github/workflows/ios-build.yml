name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  build:
    runs-on: macos-latest  # Бесплатный Mac от GitHub!
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Build iOS app
      run: |
        # Создаем Xcode проект
        mkdir -p Build
        cd Build
        
        # Создаем минимальный Info.plist
        cat > Info.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.yourname.vpnclient</string>
            <key>CFBundleName</key>
            <string>VPNClient</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleExecutable</key>
            <string>VPNClient</string>
        </dict>
        </plist>
        EOF
        
        # Создаем псевдо-приложение (для демонстрации)
        mkdir -p Payload
        echo "VPN Client" > Payload/README.txt
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: VPNClient
        path: Build/Payload/